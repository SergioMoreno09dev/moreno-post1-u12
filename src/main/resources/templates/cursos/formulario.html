<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Curso</title>
</head>
<body>
<h1>Nuevo Curso</h1>

<form th:action="@{/cursos/guardar}" th:object="${curso}" method="post">
    <label>Nombre:</label>
    <input type="text" th:field="*{nombre}" />
    <span th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
    <br><br>

    <label>Créditos:</label>
    <input type="number" th:field="*{creditos}" />
    <br><br>

    <button type="submit">Guardar</button>
</form>

<br>
<a href="/cursos">Volver a la lista</a>
</body>
</html>
